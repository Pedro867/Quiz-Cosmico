<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Cósmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-3 fw-bold" style="font-family: 'Pacifico', cursive; color: #ff6b6b;">
                <i class="bi bi-stars"></i> Quiz Cósmico <i class="bi bi-planet"></i>
            </h1>
            <p class="lead text-secondary">Teste seus conhecimentos sobre o universo!</p>
        </div>

        <main class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="content card bg-dark border-secondary shadow-lg" style="display: none; max-width: 800px; width: 100%;">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-center align-items-center mb-4">
                        <span class="spnQtd badge bg-primary fs-5 px-3 py-2">
                            <i class="bi bi-question-circle"></i> 0/0
                        </span>
                    </div>
                    <div class="question fs-4 fw-semibold mb-4 text-light"></div>
                    <div class="answer d-flex flex-column gap-3"></div>
                </div>
            </div>

            <div class="start card bg-dark border-secondary shadow-lg" style="max-width: 500px; width: 100%;">
                <div class="card-body text-center p-5">
                    <i class="bi bi-rocket-takeoff display-1 text-primary mb-3"></i>
                    <h2 class="text-secondary mb-4">Pronto para viajar pelo cosmos?</h2>
                    <p class="text-secondary mb-4">Teste seus conhecimentos sobre astronomia!</p>
                    <button class="btn btn-primary btn-lg px-5" id="start-btn">
                        <i class="bi bi-play-fill"></i> Iniciar Quiz
                    </button>
                </div>
            </div>

            <div class="finish card bg-dark border-secondary shadow-lg" style="display: none; max-width: 800px; width: 100%;">
                <div class="card-body text-center p-5">
                    <i class="bi bi-trophy display-1 text-warning mb-3"></i>
                    <h2 class="mb-3">Quiz Finalizado!</h2>
                    <div class="finish-score mb-4">
                        <span class="display-4 fw-bold text-primary"></span>
                        <p class="text-secondary mt-2">pontos conquistados</p>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mb-4">
                        <button class="btn btn-success btn-lg" id="restart-btn">
                            <i class="bi bi-arrow-repeat"></i> Reiniciar
                        </button>
                        <button class="btn btn-info btn-lg" id="respBtn">
                            <i class="bi bi-eye"></i> Ver Respostas
                        </button>
                    </div>

                    <div class="resposta mt-4 p-3 bg-secondary bg-opacity-25 rounded" style="display: none; text-align: left;">
                        <h5 class="mb-3"><i class="bi bi-lightbulb"></i> Respostas Corretas:</h5>
                        <div class="answers-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/qs.js" type="module"></script>
    <script src="js/script.js" type="module"></script>
</body>
</html>
